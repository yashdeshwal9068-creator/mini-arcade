<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors</title>
    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
            font-family: Arial;
            padding-top: 80px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .choices button {
            font-size: 20px;
            padding: 15px 25px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #222;
            color: white;
        }

        .choices button:hover {
            background: #444;
        }

        #result {
            font-size: 22px;
            margin-top: 30px;
        }

        #score {
            margin-top: 15px;
            font-size: 18px;
        }

        a {
            color: cyan;
            display: block;
            margin-top: 40px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>🪨 Rock Paper Scissors</h1>

<div class="choices">
    <button onclick="play('rock')">🪨 Rock</button>
    <button onclick="play('paper')">📄 Paper</button>
    <button onclick="play('scissors')">✂ Scissors</button>
</div>

<div id="result"></div>
<div id="score">You: 0 | Computer: 0</div>

<a href="../index.html">⬅ Back to Arcade</a>

<script>
    let userScore = 0;
    let compScore = 0;

    function play(userChoice) {
        const choices = ['rock', 'paper', 'scissors'];
        const compChoice = choices[Math.floor(Math.random() * 3)];

        let resultText = "";

        if (userChoice === compChoice) {
            resultText = "It's a Draw!";
        }
        else if (
            (userChoice === 'rock' && compChoice === 'scissors') ||
            (userChoice === 'paper' && compChoice === 'rock') ||
            (userChoice === 'scissors' && compChoice === 'paper')
        ) {
            userScore++;
            resultText = "You Win! Computer chose " + compChoice;
        }
        else {
            compScore++;
            resultText = "You Lose! Computer chose " + compChoice;
        }

        document.getElementById("result").innerText = resultText;
        document.getElementById("score").innerText =
            "You: " + userScore + " | Computer: " + compScore;
    }
</script>

</body>
</html>
